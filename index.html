<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resmi Oyun Sitesi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify_content: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #4CAF50; /* Oyunun ana rengi */
        }
        p {
            font-size: 1.2rem;
            color: #b0b0b0;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            background-color: #45a049;
        }
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #555;
        }
        .footer a {
            color: #777;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Oyunun Adı</h1>
        
        <p>Dünyanın en eğlenceli mobil oyun deneyimine hazır mısın? Hemen indir ve maceraya katıl!</p>

        <a href="https://play.google.com/store/apps/details?id=com.copperhand.penguinmath&pcampaignid=web_share" class="btn">Hemen İndir (Google Play)</a>

        <div class="footer">
            <p>&copy; 2026 Tüm Hakları Saklıdır.</p>
            <p><a href="#">Gizlilik Politikası</a></p>
        </div>
    </div>

</body>
</html>
